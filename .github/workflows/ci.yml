name: CI Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # On dit au robot d'entrer d'abord dans regista-cda, PUIS dans regista-backend
      - name: Install dependencies
        working-directory: ./regista-cda/regista-backend
        run: npm install

      # Pareil pour les tests !
      - name: Run Tests with Coverage
        working-directory: ./regista-cda/regista-backend
        run: npm run test:coverage